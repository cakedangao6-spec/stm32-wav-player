<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码差异审阅 - main.c 修改示例</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .header {
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #30363d;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .header .meta { color: #8b949e; font-size: 13px; margin-top: 4px; }
  .header .meta span { margin-right: 16px; }
  .file-header {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px 6px 0 0;
    padding: 8px 12px;
    font-weight: 600;
    color: #e6edf3;
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
  }
  .file-header .stats { font-weight: 400; font-size: 12px; }
  .file-header .stats .add { color: #3fb950; }
  .file-header .stats .del { color: #f85149; }
  .diff-table { width: 100%; border-collapse: collapse; }
  .diff-table tr { border-bottom: 1px solid #21262d; }
  .diff-table tr:last-child { border-bottom: none; }
  .diff-table td {
    padding: 0 8px;
    white-space: pre;
    vertical-align: top;
  }
  .line-num {
    width: 50px;
    text-align: right;
    color: #484f58;
    user-select: none;
    padding: 0 12px !important;
    background: #0d1117;
    font-size: 12px;
  }
  .line-add { background: #0f2d1a; }
  .line-add .line-num { background: #0f2d1a; color: #3fb950; }
  .line-add .line-code::before { content: \"+\"; color: #3fb950; margin-right: 8px; font-weight: bold; }
  .line-del { background: #2d1215; }
  .line-del .line-num { background: #2d1215; color: #f85149; }
  .line-del .line-code::before { content: \"-\"; color: #f85149; margin-right: 8px; font-weight: bold; }
  .line-ctx .line-code::before { content: \" \"; margin-right: 8px; }
  .line-code { width: 100%; color: #c9d1d9; }
</style>
</head>
<body>
<div class="header">
  <h1>代码差异审阅</h1>
  <div class="meta">
    <span>文件: 1</span>
    <span style="color:#3fb950">+3</span>
    <span style="color:#f85149">-1</span>
  </div>
</div>

<div class="file-header">
  <span>User/main.c</span>
  <span class="stats"><span class="add">+3</span> <span class="del">-1</span></span>
</div>
<table class="diff-table">
  <tr class="line-ctx">
    <td class="line-num">41</td><td class="line-num">41</td>
    <td class="line-code">while (1)</td>
  </tr>
  <tr class="line-ctx">
    <td class="line-num">42</td><td class="line-num">42</td>
    <td class="line-code">{</td>
  </tr>
  <tr class="line-del">
    <td class="line-num">43</td><td class="line-num"></td>
    <td class="line-code">    uint8_t data;</td>
  </tr>
  <tr class="line-add">
    <td class="line-num"></td><td class="line-num">43</td>
    <td class="line-code">    uint8_t data;</td>
  </tr>
  <tr class="line-add">
    <td class="line-num"></td><td class="line-num">44</td>
    <td class="line-code">    uint32_t flash_addr = 0;</td>
  </tr>
  <tr class="line-add">
    <td class="line-num"></td><td class="line-num">45</td>
    <td class="line-code">    uint8_t page_buf[256];</td>
  </tr>
  <tr class="line-ctx">
    <td class="line-num">44</td><td class="line-num">46</td>
    <td class="line-code">    Serial_ProcessDMARx();</td>
  </tr>
</table>
</body>
</html>
